version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: nucleus-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      ODOO_URL: http://odoo:8069
      ODOO_DB: manufacturing
      ODOO_USERNAME: ${ODOO_USERNAME}
      ODOO_PASSWORD: ${ODOO_PASSWORD}
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,https://yourdomain.com
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      LOG_LEVEL: info
    depends_on:
      odoo:
        condition: service_healthy
    networks:
      - nucleus-network
    volumes:
      - ./backend/public:/app/public
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "dumb-init", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: nucleus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: /api
      VITE_FRONTEND_URL: http://localhost:3000
      VITE_ODOO_URL: http://localhost:8069
      VITE_APP_NAME: Nucleus Metal Cast
      VITE_ENABLE_DEBUG: false
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nucleus-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Odoo Service
  odoo:
    image: odoo:18.0
    container_name: nucleus-odoo
    restart: unless-stopped
    ports:
      - "8069:8069"
    environment:
      ODOO_DB_HOST: postgres
      ODOO_DB_PORT: 5432
      ODOO_DB_NAME: manufacturing
      ODOO_DB_USER: odoo
      ODOO_DB_PASSWORD: ${ODOO_DB_PASSWORD}
      ODOO_ADMIN_PASSWORD: ${ODOO_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./odoo_module:/mnt/extra-addons
      - odoo-data:/var/lib/odoo
    networks:
      - nucleus-network
    command: odoo -d manufacturing -i base,website --db-filter=manufacturing$

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nucleus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: manufacturing
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - nucleus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d manufacturing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: nucleus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nucleus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nucleus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    networks:
      - nucleus-network

volumes:
  postgres-data:
    driver: local
  odoo-data:
    driver: local
  redis-data:
    driver: local
  backend_logs:
    driver: local

networks:
  nucleus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
