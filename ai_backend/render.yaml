services:
  # AI Backend Service
  - type: web
    name: nucleus-ai
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: PORT
        value: 8000
      - key: OPENROUTER_API_KEY
        sync: false
      - key: BASE_URL
        value: https://benevolent-bavarois-0cadab.netlify.app/
      - key: ALLOWED_ORIGINS
        value: https://nucleus.netlify.app,http://localhost:3000,http://localhost:5173
